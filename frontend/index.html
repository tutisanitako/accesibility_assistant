<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>თბილისის ასისტენტი</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#FAFAFC"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#032D8F;
  --navy-dark:#0A1F5C;
  --navy-mid:#1a3a8f;
  --blue:#1a56db;
  --blue-light:#EEF4FF;
  --blue-pale:#F3F6FD;
  --blue-border:#E4EAF6;
  --text-main:#0A1F5C;
  --text-muted:#6C7AA0;
  --text-light:#9BAAC8;
  --border:#E8ECF4;
  --bg:#FAFAFC;
  --white:#ffffff;
  --red:#C0392B;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans Georgian',sans-serif;color:var(--text-main);}
body{display:flex;flex-direction:column;}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;height:68px;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--border);z-index:100;}
.header-left{display:flex;align-items:center;gap:16px;}
.header-mic-icon{width:44px;height:44px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 0 5px rgba(3,45,143,0.08);}
.header-mic-icon svg{width:20px;height:20px;fill:white;}
.header-title{font-size:20px;font-weight:700;color:var(--navy-dark);line-height:1.2;}
.header-sub{font-size:13px;font-weight:400;color:var(--text-muted);margin-top:1px;}
.header-right{display:flex;gap:10px;align-items:center;}
.hist-btn{display:flex;align-items:center;gap:8px;height:42px;padding:0 18px;border:1px solid #DCE3F0;border-radius:12px;background:var(--white);cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;font-size:14px;font-weight:500;color:var(--text-main);transition:border-color 0.15s,background 0.15s;}
.hist-btn:hover{background:var(--blue-pale);border-color:#b8c8ee;}
.hist-btn svg{width:17px;height:17px;fill:none;stroke:var(--text-muted);stroke-width:2;}
.home-btn{display:flex;align-items:center;gap:8px;height:42px;padding:0 16px;border:1px solid #DCE3F0;border-radius:12px;background:var(--white);cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;font-size:14px;font-weight:500;color:var(--text-muted);transition:all 0.15s;}
.home-btn:hover{background:var(--blue-pale);}
.home-btn.saved{color:var(--blue);border-color:#b8c8ee;}
.home-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;}

/* ── MAIN LAYOUT ── */
.page-body{flex:1;min-height:0;overflow:hidden;display:flex;align-items:stretch;justify-content:center;padding:14px 18px 76px;}

/* ── CARD ── */
.main-card{width:100%;max-width:820px;background:var(--white);border:1px solid var(--border);border-radius:22px;padding:18px 22px 14px;display:flex;flex-direction:column;align-items:center;overflow:hidden;min-height:0;}

/* ── MIC ── */
.mic-section{display:flex;flex-direction:column;align-items:center;margin-bottom:14px;flex-shrink:0;}
.mic-glow-ring{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(91,141,238,0.12) 0%,rgba(91,141,238,0.04) 60%,transparent 100%);display:flex;align-items:center;justify-content:center;position:relative;}
.mic-glow-ring::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;border:2px solid rgba(3,45,143,0.08);}
#big-mic-btn{width:150px;height:150px;border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 38% 35%, #1a56db 0%, #032D8F 55%, #021e6b 100%);box-shadow:0 6px 24px rgba(3,45,143,0.35),0 2px 6px rgba(3,45,143,0.2);display:flex;align-items:center;justify-content:center;transition:transform 0.15s,box-shadow 0.15s;outline:none;-webkit-tap-highlight-color:transparent;position:relative;z-index:1;}
#big-mic-btn:hover{transform:scale(1.03);box-shadow:0 10px 32px rgba(3,45,143,0.4);}
#big-mic-btn:active{transform:scale(0.97);}
#big-mic-btn svg{width:60px;height:60px;fill:white;}
#big-mic-btn.recording{background:radial-gradient(circle at 38% 35%,#e05c6a 0%,#b02030 55%,#7a0e1a 100%);box-shadow:0 6px 24px rgba(224,92,106,0.45);animation:recPulse 1.5s ease-in-out infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 6px 24px rgba(224,92,106,0.45),0 0 0 0 rgba(224,92,106,0.3);}50%{box-shadow:0 6px 24px rgba(224,92,106,0.45),0 0 0 18px rgba(224,92,106,0);}}
.mic-label{margin-top:12px;font-size:17px;font-weight:600;color:var(--navy-dark);text-align:center;}
.mic-label.recording-text{color:#c0392b;}

/* ── CONVERSATION ── */
.convo-section{width:100%;flex:1;min-height:0;border:1px solid var(--border);border-radius:20px;padding:16px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;background:var(--bg);scroll-behavior:smooth;}
.convo-section::-webkit-scrollbar{width:4px;}
.convo-section::-webkit-scrollbar-track{background:transparent;}
.convo-section::-webkit-scrollbar-thumb{background:#d0d8ee;border-radius:4px;}

/* Messages */
.msg-row{display:flex;align-items:flex-end;gap:10px;}
.msg-row.user{flex-direction:row-reverse;}
.bot-av{width:38px;height:38px;border-radius:50%;background:var(--navy);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.bot-av svg{width:18px;height:18px;fill:white;}
.user-av{width:34px;height:34px;border-radius:50%;background:#dde6ff;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.user-av svg{width:16px;height:16px;fill:none;stroke:var(--navy);stroke-width:2;}
.bwrap{display:flex;flex-direction:column;max-width:75%;gap:3px;}
.msg-row.user .bwrap{align-items:flex-end;}
.msg-row.bot  .bwrap{align-items:flex-start;}
.bubble{padding:12px 16px;border-radius:18px;font-size:17px;line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.msg-row.bot  .bubble{background:#F5F7FC;color:var(--text-main);border-bottom-left-radius:4px;}
.msg-row.user .bubble{background:var(--blue-light);color:var(--text-main);border-bottom-right-radius:4px;}
.msg-time{font-size:11px;color:var(--text-light);padding:0 3px;}

/* Typing */
.typing-bubble{background:#F5F7FC;border-radius:20px;border-bottom-left-radius:5px;padding:18px 22px;display:flex;align-items:center;gap:6px;}
.tdot{width:9px;height:9px;border-radius:50%;background:var(--text-light);animation:tdBounce 1.4s ease-in-out infinite;}
.tdot:nth-child(2){animation-delay:.2s;}
.tdot:nth-child(3){animation-delay:.4s;}
@keyframes tdBounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-7px);opacity:1;}}

audio.inline-audio{width:100%;height:38px;margin-top:10px;border-radius:8px;accent-color:var(--blue);}

/* ── QUICK ACTIONS ── */
.quick-row{display:flex;gap:12px;margin-top:12px;width:100%;flex-shrink:0;}
.qa-card{flex:1;height:72px;background:var(--blue-pale);border:1px solid var(--blue-border);border-radius:16px;padding:0 18px;display:flex;align-items:center;gap:12px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;font-size:16px;font-weight:700;color:var(--navy-dark);transition:background 0.15s,border-color 0.15s;}
.qa-card:hover{background:#e6eeff;border-color:#b8c8ee;}
.qa-card svg{width:26px;height:26px;flex-shrink:0;fill:none;stroke:var(--navy);stroke-width:1.8;}
.qa-card span{text-align:left;line-height:1.3;}

/* ── BOTTOM INPUT ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);padding:10px 0 14px;border-top:1px solid var(--border);z-index:50;}
.input-inner{max-width:860px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px;}
.input-shell{flex:1;height:56px;background:var(--white);border:1px solid #DDE5F2;border-radius:999px;padding:0 20px;display:flex;align-items:center;}
#text-input{flex:1;border:none;outline:none;background:transparent;font-family:'Noto Sans Georgian',sans-serif;font-size:17px;color:var(--text-main);}
#text-input::placeholder{color:var(--text-light);}
#text-send{width:44px;height:44px;border-radius:50%;border:none;background:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s;}
#text-send:hover{background:var(--navy-mid);}
#text-send svg{width:18px;height:18px;fill:white;margin-left:2px;}

/* ── HOME PANEL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,31,92,0.35);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.panel-sheet{background:var(--white);border-radius:28px 28px 0 0;width:100%;max-width:860px;padding:28px 28px 44px;display:flex;flex-direction:column;gap:16px;}
.panel-title{font-size:22px;font-weight:700;color:var(--navy-dark);}
.panel-close{align-self:flex-end;background:none;border:none;font-size:26px;color:var(--text-light);cursor:pointer;line-height:1;margin-top:-6px;}
.panel-sheet label{font-size:16px;color:var(--text-muted);}
.panel-sheet input{width:100%;height:56px;border:1.5px solid var(--border);border-radius:14px;padding:0 18px;font-family:'Noto Sans Georgian',sans-serif;font-size:18px;color:var(--text-main);outline:none;}
.panel-sheet input:focus{border-color:var(--blue);}
.panel-row{display:flex;gap:12px;}
.psave{flex:1;height:54px;background:var(--navy);border:none;border-radius:14px;color:white;font-family:'Noto Sans Georgian',sans-serif;font-size:17px;font-weight:700;cursor:pointer;}
.pgps{flex:1;height:54px;background:white;border:1.5px solid var(--blue);border-radius:14px;color:var(--blue);font-family:'Noto Sans Georgian',sans-serif;font-size:17px;cursor:pointer;}
#home-status{font-size:14px;color:#2d8a5e;min-height:20px;}

/* ── HISTORY PAGE ── */
#history-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;}
#history-page.open{display:flex;}
.hist-header{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;height:68px;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--border);gap:14px;}
.hist-back{width:42px;height:42px;border-radius:50%;border:none;background:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hist-back svg{width:20px;height:20px;fill:white;}
.hist-header-text{flex:1;min-width:0;}
.hist-header-title{font-size:20px;font-weight:700;color:var(--navy-dark);line-height:1.2;}
.hist-header-sub{font-size:13px;color:var(--text-muted);margin-top:1px;}
.hist-clear-btn{display:flex;align-items:center;gap:8px;height:42px;padding:0 16px;border:1px solid #f0c0bb;border-radius:12px;background:white;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;font-size:14px;font-weight:500;color:var(--red);white-space:nowrap;}
.hist-clear-btn svg{width:16px;height:16px;fill:none;stroke:var(--red);stroke-width:2;}
.hist-body{flex:1;overflow-y:auto;padding:16px 24px 40px;max-width:820px;width:100%;margin:0 auto;align-self:stretch;}
.hist-search-row{margin-bottom:16px;}
.hist-search-wrap{height:48px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:0 16px;display:flex;align-items:center;gap:12px;}
.hist-search-wrap svg{width:18px;height:18px;fill:none;stroke:var(--text-light);stroke-width:2;flex-shrink:0;}
#hist-search{border:none;outline:none;background:transparent;font-family:'Noto Sans Georgian',sans-serif;font-size:16px;color:var(--text-main);flex:1;}
#hist-search::placeholder{color:var(--text-light);}
.hist-list{display:flex;flex-direction:column;}
.hist-item{position:relative;display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;gap:12px;}
.hist-item:last-child{border-bottom:none;}
.hist-item:hover .hist-item-title{color:var(--blue);}
.hist-item-left{flex:1;min-width:0;}
.hist-item-title{font-size:17px;font-weight:600;color:var(--navy-dark);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-item-tag{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);}
.tag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.hist-item-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hist-item-time{font-size:13px;color:var(--text-light);white-space:nowrap;}
.hist-item-menu{width:32px;height:32px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-light);font-size:20px;line-height:1;}
.hist-item-menu:hover{background:var(--blue-pale);}
.hist-empty{text-align:center;padding:48px 0;color:var(--text-muted);font-size:18px;}
.hist-footer{margin-top:20px;padding:13px 16px;background:#F3F6FD;border-radius:12px;display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text-muted);}
.hist-footer svg{width:18px;height:18px;fill:none;stroke:var(--text-muted);stroke-width:2;flex-shrink:0;}
.hist-menu-dropdown{display:none;position:absolute;right:0;top:36px;background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:50;min-width:130px;overflow:hidden;}
.hist-menu-dropdown.open{display:block;}
.hist-menu-action{width:100%;padding:11px 16px;border:none;background:none;font-family:'Noto Sans Georgian',sans-serif;font-size:14px;text-align:left;cursor:pointer;display:block;color:var(--text-main);}
.hist-menu-action:hover{background:var(--blue-pale);}
.hist-menu-action.danger{color:var(--red);}
.hist-menu-action.danger:hover{background:#fff3f3;}

/* ── HISTORY DETAIL ── */
#hdetail-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;flex-direction:column;}
#hdetail-page.open{display:flex;}
.hd-topbar{display:flex;align-items:center;padding:12px 28px;height:68px;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--border);gap:14px;}
.hd-back-btn{width:42px;height:42px;border-radius:50%;border:none;background:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hd-back-btn svg{width:20px;height:20px;fill:white;}
.hd-topbar-info{flex:1;min-width:0;}
.hd-topbar-title{font-size:16px;font-weight:700;color:var(--navy-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hd-topbar-meta{display:flex;align-items:center;gap:8px;margin-top:2px;}
.hd-tag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.hd-tag-lbl{font-size:12px;color:var(--text-muted);}
.hd-topbar-time{font-size:12px;color:var(--text-light);}
.hd-topbar-menu-wrap{position:relative;flex-shrink:0;}
.hd-topbar-menu{width:40px;height:40px;border-radius:50%;border:none;background:none;cursor:pointer;font-size:22px;color:var(--text-light);display:flex;align-items:center;justify-content:center;}
.hd-topbar-menu:hover{background:var(--blue-pale);}
.hd-topbar-dropdown{display:none;position:absolute;right:0;top:44px;background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:600;min-width:140px;overflow:hidden;}
.hd-topbar-dropdown.open{display:block;}
.hd-dropdown-action{width:100%;padding:12px 16px;border:none;background:none;font-family:'Noto Sans Georgian',sans-serif;font-size:14px;text-align:left;cursor:pointer;display:block;color:var(--text-main);}
.hd-dropdown-action:hover{background:var(--blue-pale);}
.hd-dropdown-action.danger{color:var(--red);}
.hd-dropdown-action.danger:hover{background:#fff3f3;}
.hd-msgs-wrap{flex:1;overflow-y:auto;padding:16px 20px 24px;display:flex;flex-direction:column;gap:14px;max-width:820px;width:100%;margin:0 auto;}
.hd-msgs-wrap::-webkit-scrollbar{width:4px;}
.hd-msgs-wrap::-webkit-scrollbar-thumb{background:#d0d8ee;border-radius:4px;}
.hd-row{display:flex;align-items:flex-end;gap:8px;}
.hd-row.user{flex-direction:row-reverse;}
.hd-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.hd-av.bot{background:var(--navy);}
.hd-av.user{background:#dde6ff;}
.hd-bwrap{display:flex;flex-direction:column;max-width:80%;gap:3px;}
.hd-row.user .hd-bwrap{align-items:flex-end;}
.hd-row.bot  .hd-bwrap{align-items:flex-start;}
.hd-bub{padding:10px 14px;border-radius:14px;font-size:15px;line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.hd-row.bot  .hd-bub{background:#F5F7FC;border-bottom-left-radius:3px;color:var(--text-main);}
.hd-row.user .hd-bub{background:var(--blue-light);border-bottom-right-radius:3px;color:var(--text-main);}
.hd-time{font-size:11px;color:var(--text-light);}
.hd-footer-card{margin:6px 20px 0;padding:12px 16px;background:var(--blue-pale);border:1px solid var(--blue-border);border-radius:12px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text-muted);flex-shrink:0;max-width:820px;width:calc(100% - 40px);align-self:center;}
.hd-footer-card svg{width:20px;height:20px;fill:none;stroke:var(--blue);stroke-width:1.8;flex-shrink:0;}
.hd-footer-label{font-size:11px;color:var(--text-light);margin-bottom:1px;}
.hd-footer-val{font-size:14px;font-weight:600;color:var(--navy-dark);}

/* Offline banner */
#offline{display:none;padding:10px 24px;background:#fff3f3;border-bottom:1px solid #f9c9c9;font-size:16px;color:var(--red);text-align:center;}
#offline.show{display:block;}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .header,.hist-header,.hd-topbar{padding:10px 14px;height:56px;}
  .header-title,.hist-header-title{font-size:16px;}
  .header-sub,.hist-header-sub{font-size:11px;}
  .header-mic-icon{width:34px;height:34px;}
  .header-mic-icon svg{width:15px;height:15px;}
  .hist-btn span,.home-btn span{display:none;}
  .hist-btn,.home-btn{padding:0 10px;height:36px;min-width:36px;border-radius:10px;}
  .hist-back,.hd-back-btn{width:36px;height:36px;}
  .hist-back svg,.hd-back-btn svg{width:17px;height:17px;}
  .hist-clear-btn span{display:none;}
  .hist-clear-btn{padding:0 10px;height:36px;gap:0;}
  .page-body{padding:8px 8px 84px;}
  .main-card{padding:14px 12px 10px;border-radius:18px;}
  .mic-section{margin-bottom:8px;}
  .mic-glow-ring{width:200px;height:200px;}
  .mic-glow-ring::before{width:200px;height:200px;}
  #big-mic-btn{width:154px;height:154px;}
  #big-mic-btn svg{width:62px;height:62px;}
  .mic-label{font-size:17px;margin-top:12px;}
  .bubble{font-size:15px;padding:10px 13px;}
  .bot-av{width:34px;height:34px;}
  .user-av{width:30px;height:30px;}
  .quick-row{flex-direction:row;gap:8px;margin-top:8px;}
  .qa-card{height:72px;font-size:13px;padding:0 12px;border-radius:12px;gap:8px;}
  .qa-card svg{width:24px;height:24px;}
  .bottom-bar{padding:8px 0 14px;}
  .input-inner{padding:0 12px;gap:8px;}
  .input-shell{height:52px;padding:0 16px;}
  #text-input{font-size:15px;}
  .hist-body{padding:12px 14px 32px;}
  .hist-item-title{font-size:15px;}
  .hist-item-time{font-size:12px;}
  .hd-topbar-title{font-size:14px;}
  .hd-msgs-wrap{padding:12px 12px 20px;}
  .hd-footer-card{margin:4px 12px 0;width:calc(100% - 24px);}
}
@media(max-height:600px){
  .mic-glow-ring,.mic-glow-ring::before{width:120px;height:120px;}
  #big-mic-btn{width:92px;height:92px;}
  #big-mic-btn svg{width:36px;height:36px;}
  .mic-label{font-size:13px;margin-top:6px;}
  .mic-section{margin-bottom:6px;}
  .quick-row{margin-top:5px;}
  .qa-card{height:48px;font-size:12px;}
}
</style>
</head>
<body>

<!-- Offline banner -->
<div id="offline">⚠️ ინტერნეტი გათიშულია</div>

<!-- ── HEADER ── -->
<header class="header">
  <div class="header-left">
    <div class="header-mic-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 16.93A8.001 8.001 0 0 1 4 11H2a10 10 0 0 0 9 9.95V23h2v-2.05A10 10 0 0 0 22 11h-2a8.001 8.001 0 0 1-7 6.93z"/></svg>
    </div>
    <div>
      <div class="header-title">თბილისის ასისტენტი</div>
<!--      <div class="header-sub">თქვენი ხმა – ჩვენი დახმარება</div>-->
    </div>
  </div>
  <div class="header-right">
    <button class="home-btn" id="home-btn">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span>სახლის მისამართი</span>
    </button>
    <button class="hist-btn" id="hist-open-btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      <span>ბოლო კითხვები</span>
    </button>
  </div>
</header>

<!-- ── MAIN ── -->
<div class="page-body">
  <div class="main-card">

    <div class="mic-section">
      <div class="mic-glow-ring">
        <button id="big-mic-btn" aria-label="ჩაწერის დაწყება" aria-pressed="false">
          <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 16.93A8.001 8.001 0 0 1 4 11H2a10 10 0 0 0 9 9.95V23h2v-2.05A10 10 0 0 0 22 11h-2a8.001 8.001 0 0 1-7 6.93z"/></svg>
        </button>
      </div>
      <div class="mic-label" id="mic-label">დააჭირეთ და ისაუბრეთ</div>
    </div>

    <div class="convo-section" id="convo" role="log" aria-live="polite"></div>

    <div class="quick-row">
      <button class="qa-card" onclick="processText('ამ კვირის ღონისძიებები')">
        <svg viewBox="0 0 24 24"><path d="M2 6a2 2 0 0 1 2-2h2l2-2h8l2 2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>ამ კვირის ღონისძიებები</span>
      </button>
      <button class="qa-card" onclick="gpsNearest()">
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        <span>ავტობუსი ჩემს გაჩერებაზე</span>
      </button>
    </div>

  </div>
</div>

<!-- ── BOTTOM INPUT ── -->
<div class="bottom-bar">
  <div class="input-inner">
    <div class="input-shell">
      <input id="text-input" type="text" placeholder="თქვენი კითხვა…" autocomplete="off"/>
    </div>
    <button id="text-send" aria-label="გაგზავნა">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- ── HOME PANEL ── -->
<div class="overlay" id="home-overlay">
  <div class="panel-sheet">
    <button class="panel-close" id="home-close">✕</button>
    <div class="panel-title">სახლის მისამართი</div>
    <label>მისამართი:</label>
    <input id="home-addr" type="text" placeholder="მაგ: ვარაზის ხეობის 14, თბილისი"/>
    <div class="panel-row">
      <button class="psave" id="home-save">შენახვა</button>
      <button class="pgps"  id="home-gps">GPS = სახლი</button>
    </div>
    <div id="home-status"></div>
  </div>
</div>

<!-- ── HISTORY PAGE ── -->
<div id="history-page">
  <div class="hist-header">
    <button class="hist-back" id="hist-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="hist-header-text">
      <div class="hist-header-title">ბოლო კითხვები</div>
      <div class="hist-header-sub">შენახული საუბრების სტორია</div>
    </div>
    <button class="hist-clear-btn" id="hist-clear">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      <span>ყველას წაშლა</span>
    </button>
  </div>
  <div class="hist-body">
    <div class="hist-search-row">
      <div class="hist-search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="hist-search" type="text" placeholder="მოძებნე საუბარი…"/>
      </div>
    </div>
    <div class="hist-list" id="hist-list"></div>
    <div class="hist-footer">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>შეეხეთ საუბარს მის სანახავად. აქ არ არის აუდიო ან ვიდეო ჩანაწერები.</span>
    </div>
  </div>
</div>

<!-- ── HISTORY DETAIL ── -->
<div id="hdetail-page">
  <div class="hd-topbar">
    <button class="hd-back-btn" id="hdetail-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="hd-topbar-info">
      <div class="hd-topbar-title" id="hd-title"></div>
      <div class="hd-topbar-meta">
        <span class="hd-tag-dot" id="hd-tag-dot"></span>
        <span class="hd-tag-lbl" id="hd-tag-lbl"></span>
        <span class="hd-topbar-time" id="hd-topbar-time"></span>
      </div>
    </div>
    <div class="hd-topbar-menu-wrap">
      <button class="hd-topbar-menu" id="hd-menu-btn">⋯</button>
      <div class="hd-topbar-dropdown" id="hd-menu-dropdown">
        <button class="hd-dropdown-action danger" id="hd-delete-btn">წაშლა</button>
      </div>
    </div>
  </div>
  <div class="hd-msgs-wrap" id="hd-msgs"></div>
  <div class="hd-footer-card" id="hd-footer">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <div>
      <div class="hd-footer-label">საუბრის დამარება დრო:</div>
      <div class="hd-footer-val" id="hd-footer-val"></div>
    </div>
  </div>
</div>

<!-- Single module entry point — all JS lives in js/ -->
<script type="module" src="js/app.js"></script>

</body>
</html>
