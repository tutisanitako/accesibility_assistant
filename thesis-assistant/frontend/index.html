<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>თბილისის ასისტენტი</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="თბილისის ასისტენტი" />

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #0f0f1a;
      --surface:   #1a1a2e;
      --surface2:  #222240;
      --border:    #2e2e50;
      --accent:    #f4a942;
      --accent2:   #5b8dee;
      --green:     #4caf80;
      --red:       #e05c6a;
      --text:      #eeeef5;
      --text2:     #a0a0c0;
      --text3:     #6060a0;
      --radius:    16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans Georgian', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 80px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.01em;
    }

    .header-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    #install-btn {
      display: none;
      font-family: 'Noto Sans Georgian', sans-serif;
      font-size: 13px;
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 8px;
      font-weight: 500;
    }
    #install-btn.visible { display: block; }

    /* ── Main content ── */
    .main {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0 16px;
    }

    /* ── Offline banner ── */
    #offline-banner {
      display: none;
      background: rgba(224, 92, 106, 0.15);
      border: 1px solid var(--red);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 15px;
      color: var(--red);
      text-align: center;
      margin-top: 16px;
    }
    #offline-banner.visible { display: block; }

    /* ── Mic section ── */
    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 0 28px;
      gap: 20px;
    }

    .mic-hint {
      font-size: 15px;
      color: var(--text2);
      text-align: center;
      line-height: 1.5;
    }

    #mic-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: rgba(244, 169, 66, 0.08);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    #mic-btn:active { transform: scale(0.96); }
    #mic-btn svg { width: 44px; height: 44px; fill: var(--accent); }
    #mic-btn .btn-label {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    #mic-btn.recording {
      border-color: var(--red);
      background: rgba(224, 92, 106, 0.1);
      animation: pulse 1.4s ease-in-out infinite;
    }
    #mic-btn.recording svg { fill: var(--red); }
    #mic-btn.recording .btn-label { color: var(--red); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(224, 92, 106, 0.35); }
      50%       { box-shadow: 0 0 0 22px rgba(224, 92, 106, 0); }
    }

    /* ── Status bar ── */
    #status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      min-width: 180px;
      text-align: center;
      transition: all 0.3s;
    }
    #status-bar.active { color: var(--accent2); border-color: var(--accent2); background: rgba(91,141,238,0.08); }
    #status-bar.error  { color: var(--red);    border-color: var(--red);    background: rgba(224,92,106,0.08); }
    #status-bar.ok     { color: var(--green);  border-color: var(--green);  background: rgba(76,175,128,0.08); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 14px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon.orange { background: rgba(244,169,66,0.15); }
    .card-icon.blue   { background: rgba(91,141,238,0.15); }
    .card-icon.green  { background: rgba(76,175,128,0.15); }

    .card-icon svg { width: 20px; height: 20px; }
    .card-icon.orange svg { fill: var(--accent); }
    .card-icon.blue   svg { fill: var(--accent2); }
    .card-icon.green  svg { fill: var(--green); }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .card-body {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
    }
    .card-body.empty {
      color: var(--text3);
      font-size: 14px;
    }

    audio {
      width: 100%;
      margin-top: 14px;
      height: 40px;
      border-radius: 8px;
      accent-color: var(--accent);
    }

    /* ── Bus offer ── */
    #bus-offer {
      display: none;
      background: var(--surface2);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-top: 14px;
      flex-direction: column;
      gap: 14px;
    }
    #bus-offer.visible { display: flex; }

    #bus-offer-text {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
    }

    .offer-btns {
      display: flex;
      gap: 10px;
    }

    .offer-btn {
      flex: 1;
      font-family: 'Noto Sans Georgian', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 10px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .offer-btn:active { opacity: 0.8; }
    .offer-btn.primary   { background: var(--accent);  color: #1a1200; }
    .offer-btn.secondary { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }

    .offer-icon { font-size: 32px; text-align: center; }
.offer-title { font-size: 17px; font-weight: 700; color: var(--text); text-align: center; line-height: 1.5; }
.offer-subtitle { font-size: 14px; color: var(--text2); text-align: center; }

.concert-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 12px; overflow: hidden; animation: slideUp 0.3s ease; }
.concert-card-top { padding: 16px 18px 14px; border-bottom: 1px solid var(--border); }
.concert-name { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
.concert-venue-line { font-size: 13px; color: var(--text3); }
.concert-card-meta { display: grid; grid-template-columns: 1fr 1fr; }
.meta-cell { padding: 12px 18px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.meta-cell:nth-child(even) { border-right: none; }
.meta-cell:nth-last-child(-n+2) { border-bottom: none; }
.meta-cell-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.meta-cell-value { font-size: 14px; color: var(--text); font-weight: 500; }
.concert-card-bottom { padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.price-badge { font-size: 15px; font-weight: 700; padding: 6px 14px; border-radius: 8px; }
.price-paid { background: rgba(244,169,66,0.12); color: var(--accent); }
.price-free { background: rgba(76,175,128,0.12); color: var(--green); }
.price-sold { background: rgba(224,92,106,0.12); color: var(--red); }
.ticket-btn { font-family: 'Noto Sans Georgian', sans-serif; font-size: 14px; font-weight: 700; color: var(--accent); background: transparent; border: 1.5px solid var(--accent); padding: 8px 16px; border-radius: 8px; text-decoration: none; }

.bus-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent2); border-radius: var(--radius); margin-top: 12px; overflow: hidden; animation: slideUp 0.3s ease; }
.bus-card-header { padding: 14px 18px 10px; display: flex; align-items: center; justify-content: space-between; }
.bus-stop-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.4; }
.bus-times-section { padding: 10px 18px 16px; border-top: 1px solid var(--border); }
.bus-times-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.times-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.time-chip { background: rgba(91,141,238,0.12); color: var(--accent2); font-size: 16px; font-weight: 700; padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(91,141,238,0.2); }
.time-chip.soon { background: rgba(76,175,128,0.15); color: var(--green); border-color: rgba(76,175,128,0.25); }
.no-more-buses { font-size: 14px; color: var(--text3); font-style: italic; }

.journey-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--green); border-radius: var(--radius); margin-top: 12px; padding: 16px 18px; animation: slideUp 0.3s ease; }
.journey-route-num { font-size: 22px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
.journey-route-label { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
.journey-stop { background: rgba(76,175,128,0.08); border: 1px solid rgba(76,175,128,0.2); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text2); }
.journey-stop strong { display: block; font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }

    /* ── Results ── */
    #results { display: flex; flex-direction: column; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-top: 12px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-card.concert { border-left: 4px solid var(--accent); }
    .result-card.bus     { border-left: 4px solid var(--accent2); }
    .result-card.journey { border-left: 4px solid var(--green); }

    .result-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .result-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .result-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      min-width: 70px;
      flex-shrink: 0;
    }

    .result-value {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.5;
    }

    .result-value.highlight {
      color: var(--text);
      font-weight: 500;
    }

    .result-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
      margin-top: 10px;
    }
    .badge-concert { background: rgba(244,169,66,0.15); color: var(--accent); }
    .badge-bus     { background: rgba(91,141,238,0.15); color: var(--accent2); }
    .badge-journey { background: rgba(76,175,128,0.15); color: var(--green); }
    .badge-sold    { background: rgba(224,92,106,0.15); color: var(--red); }
    .badge-free    { background: rgba(76,175,128,0.15); color: var(--green); }

    .result-link {
      display: inline-block;
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      padding: 8px 16px;
      border: 1.5px solid var(--accent);
      border-radius: 8px;
    }

    .departure-times {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .dep-time {
      background: rgba(91,141,238,0.12);
      color: var(--accent2);
      font-size: 14px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-title">🎵 თბილისის ასისტენტი</div>
    <div class="header-sub">კონცერტები · ავტობუსები</div>
  </div>
  <button id="install-btn" aria-label="პროგრამის დაინსტალირება">+ დაყენება</button>
</header>

<main class="main" role="main">

  <div id="offline-banner" role="alert">⚠️ ინტერნეტი გათიშულია</div>

  <section class="mic-section" aria-label="ხმოვანი შეყვანა">
    <p class="mic-hint">დააჭირეთ ღილაკს და დასვით კითხვა</p>

    <button id="mic-btn" aria-label="ჩაწერის დაწყება" aria-pressed="false">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 16.93A8.001 8.001 0 0 1 4 11H2a10 10 0 0 0 9 9.95V23h2v-2.05A10 10 0 0 0 22 11h-2a8.001 8.001 0 0 1-7 6.93z"/>
      </svg>
      <span class="btn-label">ლაპარაკი</span>
    </button>

    <div id="status-bar" aria-live="polite" role="status">მოლოდინში...</div>
    <div style="width:100%;margin-top:12px;display:flex;gap:8px;">
  <input id="text-input" type="text" placeholder="ან ჩაწერეთ კითხვა..."
    style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:15px;outline:none;" />
  <button id="text-send"
    style="background:var(--accent);border:none;border-radius:10px;padding:12px 18px;color:#1a1200;font-family:'Noto Sans Georgian',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">
    →
  </button>
</div>
  </section>

  <!-- You said -->
  <div class="card" aria-label="თქვენი კითხვა">
    <div class="card-header">
      <div class="card-icon orange">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <span class="card-label">თქვენი კითხვა:</span>
    </div>
    <p id="transcript" class="card-body empty" aria-live="polite">
      აქ გამოჩნდება თქვენი კითხვა...
    </p>
  </div>

  <!-- Assistant response -->
  <div class="card" aria-label="ასისტენტის პასუხი">
    <div class="card-header">
      <div class="card-icon blue">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <span class="card-label">ასისტენტის პასუხი</span>
    </div>
    <p id="response-text" class="card-body empty" aria-live="assertive">
      აქ გამოჩნდება პასუხი...
    </p>
    <audio id="response-audio" controls aria-label="ხმოვანი პასუხი" style="display:none"></audio>
  </div>

  <!-- Bus offer -->
  <div id="bus-offer" aria-live="polite" role="region" aria-label="ავტობუსის შეთავაზება">
  <div class="offer-icon">🚌</div>
  <div class="offer-title" id="bus-offer-text"></div>
  <div class="offer-subtitle">ჩვენ ვიცით, რომელი ავტობუსი მიდის</div>
  <div class="offer-btns">
    <button class="offer-btn primary" id="bus-offer-yes">✓ დიახ, მითხარი</button>
    <button class="offer-btn secondary" id="bus-offer-no">✕ არა</button>
  </div>
</div>

  <!-- Results -->
  <section id="results" aria-label="შედეგები" aria-live="polite"></section>

</main>

<script>
const API = 'https://nerissa-nonvolatilized-drew.ngrok-free.dev';

function apiFetch(path, options = {}) {
  return fetch(API + path, {
    ...options,
    headers: {
      'ngrok-skip-browser-warning': '1',
      ...(options.headers || {}),
    },
  });
}

// ── PWA ───────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW:', e));
}

let deferredPrompt;
const installBtn = document.getElementById('install-btn');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.add('visible');
});
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.classList.remove('visible');
});

// ── Offline ───────────────────────────────────────────────────────────────────
const offlineBanner = document.getElementById('offline-banner');
function checkOnline() { offlineBanner.classList.toggle('visible', !navigator.onLine); }
window.addEventListener('online', checkOnline);
window.addEventListener('offline', checkOnline);
checkOnline();

// ── Elements ──────────────────────────────────────────────────────────────────
const micBtn       = document.getElementById('mic-btn');
const statusBar    = document.getElementById('status-bar');
const transcriptEl = document.getElementById('transcript');
const responseEl   = document.getElementById('response-text');
const audioEl      = document.getElementById('response-audio');
const resultsEl    = document.getElementById('results');
const busOffer     = document.getElementById('bus-offer');
const busOfferText = document.getElementById('bus-offer-text');
const busOfferYes  = document.getElementById('bus-offer-yes');
const busOfferNo   = document.getElementById('bus-offer-no');

// ── Recording ─────────────────────────────────────────────────────────────────
let mediaRecorder, chunks = [], recording = false;

micBtn.addEventListener('click', toggle);
micBtn.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
});

async function toggle() { recording ? stopRec() : await startRec(); }

async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    chunks = [];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = processAudio;
    mediaRecorder.start();
    recording = true;
    micBtn.classList.add('recording');
    micBtn.setAttribute('aria-pressed', 'true');
    micBtn.setAttribute('aria-label', 'ჩაწერის გაჩერება');
    micBtn.querySelector('.btn-label').textContent = 'გაჩერება';
    setStatus('ჩაწერა...', 'active');
  } catch {
    setStatus('მიკროფონი მიუწვდომელია', 'error');
  }
}

function stopRec() {
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  recording = false;
  micBtn.classList.remove('recording');
  micBtn.setAttribute('aria-pressed', 'false');
  micBtn.setAttribute('aria-label', 'ჩაწერის დაწყება');
  micBtn.querySelector('.btn-label').textContent = 'ლაპარაკი';
  setStatus('დამუშავება...', 'active');
}

// ── Pipeline ──────────────────────────────────────────────────────────────────
async function processAudio() {
  hideBusOffer();
  resultsEl.innerHTML = '';

  const blob = new Blob(chunks, { type: 'audio/webm' });
  const form = new FormData();
  form.append('audio', blob, 'recording.webm');

  try {
    setStatus('გამოთქმის ამოცნობა...', 'active');
    const sttRes = await apiFetch('/transcribe?engine=google', { method: 'POST', body: form });
    if (!sttRes.ok) throw new Error(`STT ${sttRes.status}`);
    const stt = await sttRes.json();

    const said = stt.text?.trim();
    if (!said) { setStatus('ვერ გავიგე, სცადეთ თავიდან', 'error'); return; }
    setTranscript(said);

    setStatus('პასუხის მოძებნა...', 'active');
    const qRes = await apiFetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: said }),
    });
    if (!qRes.ok) throw new Error(`Query ${qRes.status}`);
    const q = await qRes.json();

    setResponse(q.response_text);
    renderResults(q);
    if (q.venue_bus_offer) showBusOffer(q.venue_bus_offer);

    setStatus('ხმის სინთეზი...', 'active');
    await speak(q.response_text);
    setStatus('მზადაა ✓', 'ok');

  } catch (err) {
    setStatus('შეცდომა — შეამოწმეთ კავშირი', 'error');
    console.error(err);
  }
}

// ── TTS ───────────────────────────────────────────────────────────────────────
async function speak(text) {
  try {
    const res = await apiFetch('/synthesize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, language_code: 'ka-GE' }),
    });
    if (!res.ok) return;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (audioEl._objectUrl) URL.revokeObjectURL(audioEl._objectUrl);
    audioEl._objectUrl = url;
    audioEl.src = url;
    audioEl.style.display = 'block';
    audioEl.load();
    await new Promise(resolve => audioEl.addEventListener('canplay', resolve, { once: true }));
    audioEl.play();
  } catch (e) { console.warn('TTS:', e); }
}

// ── Bus offer ─────────────────────────────────────────────────────────────────
let currentVenueOffer = '';

function showBusOffer(venue) {
  currentVenueOffer = venue;
  busOfferText.textContent = `გსურთ ${venue}-სკენ მიმავალი ავტობუსები?`;
  busOffer.classList.add('visible');
}
function hideBusOffer() { busOffer.classList.remove('visible'); currentVenueOffer = ''; }

busOfferNo.addEventListener('click', hideBusOffer);
busOfferYes.addEventListener('click', async () => {
  const venue = currentVenueOffer;
  hideBusOffer();
  setStatus('ავტობუსების ძიება...', 'active');
  resultsEl.innerHTML = '';
  try {
    const res = await apiFetch(`/journey?q=${encodeURIComponent(venue)}`);
    const data = await res.json();
    if (!res.ok) {
      setResponse(data.detail || 'ავტობუსი ვერ მოიძებნა.');
    } else {
      setResponse(data.response_georgian);
      renderJourneyCards(data.stops || []);
      await speak(data.response_georgian);
    }
  } catch (err) { setStatus('შეცდომა', 'error'); console.error(err); }
  setStatus('მზადაა', 'ok');
});

// ── Render ────────────────────────────────────────────────────────────────────
function renderResults({ intent, results }) {
  resultsEl.innerHTML = '';
  if (!results?.length) return;

  if (intent === 'concert_search') {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-top:20px;margin-bottom:4px;padding:0 2px';
    hdr.textContent = `🎵 ნაპოვნი კონცერტები (${results.length})`;
    resultsEl.appendChild(hdr);

    results.forEach(c => {
      const isSoldOut = c.price === 'გაყიდულია';
      const isFree = c.price === 'უფასო';
      const priceClass = isSoldOut ? 'price-sold' : isFree ? 'price-free' : 'price-paid';
      const priceLabel = isSoldOut ? '🔴 გაყიდულია' : isFree ? '🟢 უფასო' : `💰 ${c.price}`;
      const card = document.createElement('article');
      card.className = 'concert-card';
      card.setAttribute('aria-label', c.name);
      card.innerHTML = `
        <div class="concert-card-top">
          <div class="concert-name">${c.name}</div>
          <div class="concert-venue-line">📍 ${c.venue !== 'N/A' ? c.venue : 'ადგილი უცნობია'}</div>
        </div>
        <div class="concert-card-meta">
          <div class="meta-cell">
            <div class="meta-cell-label">📅 თარიღი</div>
            <div class="meta-cell-value">${c.date}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-cell-label">🕐 დრო</div>
            <div class="meta-cell-value">${c.time !== 'N/A' ? c.time : '—'}</div>
          </div>
        </div>
        <div class="concert-card-bottom">
          <span class="price-badge ${priceClass}">${priceLabel}</span>
          ${c.url !== 'N/A' && !isSoldOut ? `<a class="ticket-btn" href="${c.url}" target="_blank" rel="noopener">ბილეთი →</a>` : ''}
        </div>
      `;
      resultsEl.appendChild(card);
    });

  } else if (intent === 'bus_search') {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-top:20px;margin-bottom:4px;padding:0 2px';
    hdr.textContent = '🚌 გაჩერებები და გრაფიკი';
    resultsEl.appendChild(hdr);

    results.forEach(stop => {
      const now = new Date();
      const nowMins = now.getHours() * 60 + now.getMinutes();
      const times = (stop.schedule || [])
        .flatMap(h => h.departures.map(m => ({ h: h.hour, m: parseInt(m), total: h.hour*60+parseInt(m) })))
        .filter(t => t.total > nowMins)
        .slice(0, 5)
        .map(t => ({ label: `${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`, soon: (t.total - nowMins) <= 10 }));
      const stopName = stop.name.replace(/\s*\[\d+\]/g, '').replace(/^მ\/ს\s*["']?/, '').replace(/["']$/, '').trim();
      const card = document.createElement('article');
      card.className = 'bus-card';
      card.innerHTML = `
        <div class="bus-card-header"><div class="bus-stop-name">${stopName}</div></div>
        <div class="bus-times-section">
          <div class="bus-times-label">შემდეგი ავტობუსები</div>
          ${times.length
            ? `<div class="times-grid">${times.map(t => `<span class="time-chip${t.soon ? ' soon' : ''}">${t.label}${t.soon ? ' ⚡' : ''}</span>`).join('')}</div>`
            : '<div class="no-more-buses">დღის ბოლო რეისი გავიდა</div>'}
        </div>
      `;
      resultsEl.appendChild(card);
    });

  } else if (intent === 'journey_search') {
    renderJourneyCards(results);
  }
}

function renderJourneyCards(stops) {
  resultsEl.innerHTML = '';
  const hdr = document.createElement('div');
  hdr.style.cssText = 'font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-top:20px;margin-bottom:4px;padding:0 2px';
  hdr.textContent = '🚌 შესაბამისი მარშრუტები';
  resultsEl.appendChild(hdr);

  const byRoute = {};
  stops.forEach(s => {
    if (!byRoute[s.route_number]) byRoute[s.route_number] = s;
  });

  Object.entries(byRoute).forEach(([route, stop]) => {
    const now = new Date();
    const nowMins = now.getHours() * 60 + now.getMinutes();
    const times = (stop.schedule || [])
      .flatMap(h => h.departures.map(m => ({
        h: h.hour, m: parseInt(m),
        total: h.hour * 60 + parseInt(m)
      })))
      .filter(t => t.total > nowMins)
      .slice(0, 4)
      .map(t => ({
        label: `${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`,
        mins: t.total - nowMins,
        soon: (t.total - nowMins) <= 10
      }));

    const stopName = stop.stop_name.replace(/\s*\[\d+\]/g, '').replace(/^მ\/ს\s*["']?/, '').replace(/["']$/, '').trim();

    const card = document.createElement('article');
    card.className = 'journey-card';
    card.innerHTML = `
      <div class="journey-route-num">${route}-ე მარშრუტი</div>
      <div class="journey-route-label">📍 ${stopName}</div>
      ${times.length ? `
        <div class="bus-times-label" style="margin-top:10px">შემდეგი ავტობუსები</div>
        <div class="times-grid" style="margin-top:6px">
          ${times.map(t => `<span class="time-chip${t.soon ? ' soon' : ''}">${t.label} <small style="font-size:11px;opacity:0.8">${t.mins}წთ${t.soon ? ' ⚡' : ''}</small></span>`).join('')}
        </div>
      ` : '<div class="no-more-buses" style="margin-top:8px">დღის ბოლო რეისი გავიდა</div>'}
    `;
    resultsEl.appendChild(card);
  });
}

const textInput = document.getElementById('text-input');
const textSend = document.getElementById('text-send');

async function processText(text) {
  hideBusOffer();
  resultsEl.innerHTML = '';
  setTranscript(text);
  setStatus('პასუხის მოძებნა...', 'active');
  try {
    const qRes = await apiFetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!qRes.ok) throw new Error(`Query ${qRes.status}`);
    const q = await qRes.json();
    setResponse(q.response_text);
    renderResults(q);
    if (q.venue_bus_offer) showBusOffer(q.venue_bus_offer);
    setStatus('ხმის სინთეზი...', 'active');  // ← added
    await speak(q.response_text);             // ← added
    setStatus('მზადაა ✓', 'ok');
  } catch (err) {
    setStatus('შეცდომა', 'error');
    console.error(err);
  }
}

textSend.addEventListener('click', () => {
  const text = textInput.value.trim();
  if (text) { processText(text); textInput.value = ''; }
});

textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const text = textInput.value.trim();
    if (text) { processText(text); textInput.value = ''; }
  }
});


// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(msg, cls) {
  statusBar.textContent = msg;
  statusBar.className = cls || '';
}
function setTranscript(text) {
  transcriptEl.textContent = text;
  transcriptEl.classList.remove('empty');
}
function setResponse(text) {
  responseEl.textContent = text;
  responseEl.classList.remove('empty');
}
</script>
